spring.application.name=Teza
spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.open-in-view=true

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# Thymeleaf - cache activat in productie
spring.thymeleaf.cache=true

# Logging
debug=false
logging.level.root=WARN
logging.level.com.example.Project.Teza=INFO
logging.level.org.thymeleaf=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN

# GitHub Models API - valoarea vine tot din Environment Variables
github.models.api.key=${GITHUB_MODELS_API_KEY}

# Render seteaza automat portul prin variabila PORT
server.port=${PORT:8082}