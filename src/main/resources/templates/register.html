<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ro">
<head>
    <meta charset="UTF-8"/>
    <title>Înregistrare - SocialBiz Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh;
               background: linear-gradient(135deg, #f0ebff 0%, #e8f0ff 100%);
               display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 40px;
                box-shadow: 0 4px 32px rgba(108,71,255,0.08);
                width: 100%; max-width: 460px; }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
        .brand-icon { width: 42px; height: 42px; background: #6c47ff; border-radius: 12px;
                      display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .brand h1 { font-size: 18px; font-weight: 700; }
        h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .sub { color: #888; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500;
                            color: #444; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e5e5;
                            border-radius: 10px; font-size: 14px; outline: none; background: #fafafa; }
        .form-group input:focus { border-color: #6c47ff; background: white; }
        .btn-register { width: 100%; padding: 13px; background: #6c47ff; color: white;
                        border: none; border-radius: 12px; font-size: 15px;
                        font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-register:hover { background: #5a38e0; }
        .link-login { display: block; text-align: center; color: #6c47ff;
                      font-size: 14px; text-decoration: none; margin-top: 16px; }
        .alert-error { padding: 12px 16px; border-radius: 10px; font-size: 13px;
                       background: #fcebeb; color: #A32D2D; border: 1px solid #f0c0c0;
                       margin-bottom: 18px; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">
        <div class="brand-icon">🛍</div>
        <h1>SocialBiz Assistant</h1>
    </div>

    <h2>Creează cont nou</h2>
    <p class="sub">Completează datele pentru a începe</p>

    <div th:if="${eroare}" class="alert-error" th:text="${eroare}"></div>

    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label>Numele Afacerii *</label>
            <input type="text" name="numeAfacere"
                   placeholder="ex: Fashion by Maria" required/>
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email"
                   placeholder="exemplu@email.com" required/>
        </div>
        <div class="form-group">
            <label>Telefon</label>
            <input type="text" name="telefon"
                   placeholder="ex: 0722334455"/>
        </div>
        <div class="form-group">
            <label>Parolă *</label>
            <input type="password" name="parola"
                   placeholder="Minimum 6 caractere" minlength="6" required/>
        </div>
        <button type="submit" class="btn-register">Creează Cont</button>
    </form>

    <a th:href="@{/login}" class="link-login">Am deja cont. Mă loghez!</a>
</div>
</body>
</html>
